<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokemon Details</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/src/client/style.css">
</head>
<body>
  <div class="container my-5">
    <a href="index.html" class="btn btn-secondary mb-4">Back to Search</a>
    <div id="details" class="card p-4"></div>
  </div>

  <hr>
  <h3 class="mt-4">Related Videos</h3>
  <div id="videos-container" class="row">
  </div>

  <script>
    // Fetch and display Pokémon details by ID from URL
    async function loadDetails() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get("id");
      if (!id) {
        document.getElementById("details").innerHTML = "<p class='text-danger'>Missing Pokemon ID</p>";
        return;
      }

      try {
        // Fetch Pokémon data from the PokéAPI
        const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
        const data = await res.json();
        // Construct and insert the HTML displaying detailed Pokémon info
        document.getElementById("details").innerHTML = `
          <h2 class="text-capitalize">${data.name} (ID: ${data.id})</h2>
          <img src="${data.sprites.front_default}" class="img-fluid my-3" style="max-width:200px">
          <ul class="list-group">
            <li class="list-group-item">Height: ${data.height}</li>
            <li class="list-group-item">Weight: ${data.weight}</li>
            <li class="list-group-item">Base Experience: ${data.base_experience}</li>
            <li class="list-group-item">Types: ${data.types.map(t => t.type.name).join(', ')}</li>
            <li class="list-group-item">Abilities: ${data.abilities.map(a => a.ability.name).join(', ')}</li>
          </ul>`;
     // Error message if fetch fails
      } catch (err) {
        document.getElementById("details").innerHTML = "<p class='text-danger'>Failed to load Pokemon details.</p>";
      }
    }
    // Load details when the page content has finished loading
    document.addEventListener("DOMContentLoaded", loadDetails);
  </script>
  <script src="/src/client/details.js"></script>
</body>
</html>
